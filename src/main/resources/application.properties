spring.application.name=backendlabreportassistant

# Server Configuration
server.port=8080

# TiDB Cloud Database Connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate & JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Gemini API Configuration (Secured)
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent

# Spring Mail Configuration (Secured)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=anuragsinghyadav2658@gmail.com
spring.mail.password=${MAIL_PASSWORD}

# SMTP Properties for Gmail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
